    <style>
        body { background: #000; color: #fff; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }

<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-sm glass p-10 rounded-[40px] text-center shadow-2xl">
        
        <div class="mb-8">
            <div class="relative inline-block mb-4">
                <img src="https://i.ibb.co/pv1j3NMY/pfp.jpg" 
                     onerror="this.src='https://ui-avatars.com/api/?name=Y+T&background=2563eb&color=fff'"
                     class="pfp-img mx-auto">
                <div class="absolute bottom-1 right-1 w-4 h-4 bg-green-500 border-2 border-black rounded-full"></div>
            </div>
            <h1 class="text-2xl font-black italic uppercase tracking-tighter italic">Yaduveer <span class="text-blue-500">TRG</span></h1>
        </div>

        <div id="verify-section">
            <button id="verify-btn" class="w-full py-5 bg-white/5 border border-white/10 rounded-2xl font-bold text-sm uppercase tracking-widest active:scale-95 transition-all">
                Verify Session
            </button>
        </div>

        <div id="final-cta" class="animate-in fade-in zoom-in duration-300">
            <button id="purchase-btn" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-xl shadow-[0_10px_30px_rgba(37,99,235,0.4)] active:scale-95">
                JOIN TELEGRAM
            </button>
        </div>
        
        <p class="mt-8 text-[7px] text-zinc-700 uppercase tracking-widest opacity-40">
            Purchase Signal Optimization Active
        </p>

        const vBtn = document.getElementById('verify-btn');
        const vSection = document.getElementById('verify-section');
        const fCta = document.getElementById('final-cta');
        const pBtn = document.getElementById('purchase-btn');

        // https://t.me/+MbXv8iAPe2BlYjY1
        const path = "aHR0cHM6Ly90Lm1lLytNYlh2OGlBUGUyQmxZalkx";

        vBtn.addEventListener('click', () => {
            vSection.style.display = 'none';
            fCta.style.display = 'block';
        });

        pBtn.onclick = function() {
            // 1. Fire Purchase Event IMMEDIATELY
            if (typeof fbq !== 'undefined') {
                fbq('track', 'Purchase', {
                    value: 1.00,
                    currency: 'USD'
                });
                console.log("Purchase Sent to Meta");
            }

            // 2. Visual Feedback
            this.innerText = "Connecting...";
            this.disabled = true;

            // 3. Forced Delay (800ms) 
            // This is the "Bitch, Work" fix. It forces the browser to wait 
            // long enough for the Pixel to finish its handshake with Meta.
            setTimeout(function() {
                window.location.href = atob(path);
            }, 800);
        };
